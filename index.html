<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroCam Pro</title>

    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="camera-app">

    <header>

        <div class="status">
            <span id="live">● LIVE</span>
            <span id="battery">🔋100%</span>
        </div>

        <h1>📸 RetroCam Pro</h1>

    </header>

    <main>

        <div class="camera-container">

            <video
                id="video"
                autoplay
                playsinline
                muted>
            </video>

            <canvas id="canvas"></canvas>

            <div id="flash"></div>

            <div id="timestamp"></div>

            <img id="frameOverlay" src="" alt="Frame Overlay">

        </div>

    </main>

    <section class="toolbar">

        <button id="switchCamera">
            🔄
        </button>

        <button id="timerBtn">
            ⏱
        </button>

        <button id="capture">
            📸
        </button>

        <button id="galleryBtn">
            🖼
        </button>

        <button id="settingsBtn">
            ⚙
        </button>

    </section>

    <section class="filters">

        <button data-filter="none">Original</button>
        <button data-filter="vintage">Vintage</button>
        <button data-filter="vhs">VHS</button>
        <button data-filter="polaroid">Polaroid</button>
        <button data-filter="bw">B&W</button>
        <button data-filter="dream">Dream</button>
        <button data-filter="cyber">Cyber</button>
        <button data-filter="film">Film</button>
        <button data-filter="pink">Pink</button>
        <button data-filter="retro">Retro</button>

    </section>

    <audio id="shutter">

        <source src="sounds/shutter.mp3" type="audio/mpeg">

    </audio>

</div>

<script src="script.js"></script>

</body>
</html>
